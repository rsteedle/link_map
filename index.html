<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js"></script>

  </head>

  <body>
    <div id="map-container"></div>

    <div id="tooltip" class="tooltip"></div>

    <!-- Controls Container -->
    <div class="controls-container">

    <!-- Layer Visibility -->
    <div class="control-panel">
        <div class="panel-header">Layer Visibility</div>
        <label class="toggle-item">
            <input type="checkbox" id="station-toggle" checked>
            <span>Station Markers</span>
        </label>
        <label class="toggle-item">
            <input type="checkbox" id="line-toggle" checked>
            <span>Link Lines</span>
        </label>
    </div>





    <script src="data/station_data.json"></script>
    <script src="js/script.js"> </script>




  </body>


</html>
