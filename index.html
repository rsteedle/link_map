<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js"></script>

  </head>

  <body>
    <div id="map-container"></div>

  
    <!-- Console/Controls Container -->
    <div id="console">
        <h1>Average Income of Census Tracts Served by Link Light Rail</h1>
        <p>
          Data: 
          <a
            href="https://data.census.gov/table?q=S1903:+Median+Income+in+the+Past+12+Months+(in+2024+Inflation-Adjusted+Dollars)&g=040XX00US53,53$1400000"
            >American Community Survey (ACS) 5-year estimates</a>
        </p>
        <div class="session">
          <h2>Median household income</h2>
          <div class="row colors"></div>
          <div class="row labels">
            <div class="label">$0</div>
            <div class="label">$50,000</div>
            <!-- <div class="label">$100,000</div> -->
            <div class="label">$150,000</div>
            <!-- <div class="label">$200,000</div> -->
            <div class="label">$250,000+</div>
          </div>
        </div>
        <div class="session" id="sliderbar">
          <h2>Year: <label id="display_year">2009</label></h2>
          <input
            id="slider"
            class="row"
            type="range"
            min="2009"
            max="2026"
            step="1"
            value="2009"
          />
        </div>
    </div>

  <script src="js/script.js"> </script>

  </body>

</html>
