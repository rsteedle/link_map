<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js"></script>

  </head>

  <body>
    <div id="map-container"></div>

    <!-- Controls Container -->
    <div class="controls-container">
    
      <!-- Time slider -->
      <div class="control-panel" id="sliderbar">
        <h2>Year: <label id="display_year">2009</label></h2>
        <input
          id="slider"
          class="row"
          type="range"
          min="2009"
          max="2026"
          step="1"
          value="2009"
        />
      </div>
    </div>

  <script src="data/station_data.json"></script>
  <script src="js/script.js"> </script>

  </body>

</html>
